<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>كورة علي - كأس العالم 2026</title>
  
  <!-- ملف تبيان الويب لتطبيقات الويب التقدمية (PWA) -->
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  
  <!-- علامات الميتا للهواتف المحمولة وشاشات أبل -->
  <meta name="theme-color" content="#8a1538">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="كورة علي">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- ملف التنسيقات المحدث والنسبي -->
  <link rel="stylesheet" href="./assets/css/app.css">
  
  <!-- ملف المنطق البرمجي المحدث والنسبي -->
  <script src="./assets/js/app.js" defer></script>
</head>
<body>

  <!-- إطار التطبيق الأساسي (Mobile Frame) -->
  <div class="app-container">
    
    <!-- شاشة الترحيب السينمائية الاختيارية (Splash Screen) -->
    <div id="splash" class="splash-screen">
      <div class="splash-logo-container">
        <span class="splash-logo">🏆</span>
      </div>
      <h2 class="splash-title">كورة علي</h2>
      <p class="splash-subtitle">مركز مباريات كأس العالم 2026</p>
      <button class="enter-btn" onclick="enterApp()">
        دخول بالتوقيت السعودي
        <span style="margin-right: 6px;">◀️</span>
      </button>
    </div>

    <!-- ترويسة التطبيق السينمائية الفخمة -->
    <header class="app-header">
      <div class="header-top">
        <div class="header-logo">
          <span style="font-size: 1.6rem; filter: drop-shadow(0 0 6px rgba(238,174,32,0.5))">🏆</span>
          <h1 id="header-title-text">كورة علي</h1>
        </div>
        <div class="header-time-badge">
          <span>⏰</span>
          <span>توقيت مكة المكرمة</span>
        </div>
      </div>
      <p id="header-subtitle-text" class="header-subtitle">تحميل البيانات...</p>
      <div id="disclaimer-badge" class="disclaimer-badge">نسخة تجريبية V1-C</div>
    </header>

    <!-- منطقة عرض التبويبات المتغيرة -->
    <main class="view-container">
      
      <!-- تبويب 1: مباريات اليوم -->
      <section id="view-today" class="view active">
        <!-- يتم تحميل المحتوى ديناميكياً -->
      </section>

      <!-- تبويب 2: المباريات القادمة -->
      <section id="view-upcoming" class="view">
        <div class="search-container">
          <input type="text" id="search-upcoming" class="search-input" placeholder="ابحث عن منتخب أو مجموعة...">
          <span class="search-icon">🔍</span>
        </div>
        <div id="upcoming-list">
          <!-- يتم الفرز ديناميكياً -->
        </div>
      </section>

      <!-- تبويب 3: النتائج -->
      <section id="view-results" class="view">
        <div class="search-container">
          <input type="text" id="search-results" class="search-input" placeholder="ابحث عن منتخب أو مجموعة...">
          <span class="search-icon">🔍</span>
        </div>
        <div id="results-list">
          <!-- يتم الفرز ديناميكياً -->
        </div>
      </section>

      <!-- تبويب 4: المجموعات -->
      <section id="view-groups" class="view">
        <!-- يتم الفرز ديناميكياً -->
      </section>

    </main>

    <!-- شريط التنقل السفلي الزجاجي الفاخر (iOS style) -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="today" onclick="switchTab('today', this)">
        <span class="nav-icon">⚡</span>
        <span class="nav-text">اليوم</span>
      </button>
      <button class="nav-item" data-tab="upcoming" onclick="switchTab('upcoming', this)">
        <span class="nav-icon">📅</span>
        <span class="nav-text">القادمة</span>
      </button>
      <button class="nav-item" data-tab="results" onclick="switchTab('results', this)">
        <span class="nav-icon">🏁</span>
        <span class="nav-text">النتائج</span>
      </button>
      <button class="nav-item" data-tab="groups" onclick="switchTab('groups', this)">
        <span class="nav-icon">🏆</span>
        <span class="nav-text">المجموعات</span>
      </button>
    </nav>

    <!-- نافذة تفاصيل المنتخبات السفلية المنبثقة (Bottom Sheet) -->
    <div id="sheet-overlay" class="bottom-sheet-overlay" onclick="closeBottomSheet()"></div>
    <div id="bottom-sheet" class="bottom-sheet">
      <div class="sheet-handle" onclick="closeBottomSheet()"></div>
      <button class="sheet-close" onclick="closeBottomSheet()">❌</button>
      
      <div class="sheet-header">
        <div id="sheet-flag-container" style="font-size: 3.5rem; line-height: 1;"></div>
        <h3 id="sheet-team-name" class="sheet-team-title">-</h3>
        <span id="sheet-team-rank" class="sheet-team-rank">تصنيف الفيفا: -</span>
      </div>

      <div class="sheet-section-title">
        <span>📈</span>
        مستوى الأداء (آخر 5 مباريات)
      </div>
      <div id="sheet-form-container" class="form-badges-container">
        <!-- فوز / تعادل / خسارة -->
      </div>

      <div class="sheet-section-title">
        <span>⚙️</span>
        مؤشرات الأداء التقديرية
      </div>
      <div class="sheet-stats-container">
        <div class="stat-row">
          <div class="stat-labels">
            <span>الهجوم</span>
            <span id="stat-val-attack">0%</span>
          </div>
          <div class="stat-bar-outer">
            <div id="stat-bar-attack" class="stat-bar-inner"></div>
          </div>
        </div>
        
        <div class="stat-row">
          <div class="stat-labels">
            <span>الوسط</span>
            <span id="stat-val-midfield">0%</span>
          </div>
          <div class="stat-bar-outer">
            <div id="stat-bar-midfield" class="stat-bar-inner"></div>
          </div>
        </div>

        <div class="stat-row">
          <div class="stat-labels">
            <span>الدفاع</span>
            <span id="stat-val-defense">0%</span>
          </div>
          <div class="stat-bar-outer">
            <div id="stat-bar-defense" class="stat-bar-inner"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- التنبيهات المنبثقة الصديقة (Toast) -->
    <div id="toast" class="toast">
      <span id="toast-icon">⭐</span>
      <span id="toast-text">تم الحفظ</span>
    </div>

  </div>

</body>
</html>
