name: API-Football World Cup JSON Sync

on:
  workflow_dispatch:
  # Scheduled live sync paused while Cloudflare Worker live engine is tested.
  # schedule:
  #   - cron: '2-59/5 * * * *'

concurrency:
  group: api-football-worldcup-sync
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    name: Sync API-Football Live Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Sync Script
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          if [ -z "$API_FOOTBALL_KEY" ]; then
            echo "ERROR: API_FOOTBALL_KEY secret is missing."
            exit 1
          fi
          node scripts/api-football-sync.mjs

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if assets/data/live has any changes
          git add assets/data/live/
          
          if git diff --cached --quiet; then
            echo "No changes detected in synced live JSON data."
          else
            git commit -m "Update API-Football live data"
            git pull --rebase origin main
            git push origin main
          fi
