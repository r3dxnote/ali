name: Sportmonks Provider Probe

on:
  workflow_dispatch:

jobs:
  probe:
    name: Run Sportmonks API Probe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Probe Script
        env:
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
        run: |
          if [ -z "$SPORTMONKS_API_TOKEN" ]; then
            echo "ERROR: SPORTMONKS_API_TOKEN secret is missing in GitHub repository settings."
            exit 1
          fi
          node scripts/sportmonks-probe.mjs

      - name: Upload Probe Result Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sportmonks-probe-result
          path: artifacts/sportmonks-probe-result.json
          if-no-files-found: error
